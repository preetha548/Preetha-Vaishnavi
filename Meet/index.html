<!DOCTYPE html>
<html>
<head>
  <title>Meet App </title>

  <!-- React CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    h1 {
      margin-top: 20px;
    }

    .video-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }

    video {
      width: 300px;
      border-radius: 12px;
      border: 2px solid #38bdf8;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      background: #38bdf8;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }
  </style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

function App() {
  const localRef = React.useRef(null);
  const remoteRef = React.useRef(null);

  // Start Camera
  const startCamera = async () => {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: true
    });

    // Local video
    localRef.current.srcObject = stream;

    // Fake "remote" (mirror same stream)
    remoteRef.current.srcObject = stream;
  };

  return (
    <div>
      <h1>Meet App </h1>

      <div className="video-container">
        <div>
          <h3>You</h3>
          <video ref={localRef} autoPlay playsInline muted></video>
        </div>

        <div>
          <h3>Remote User (Demo)</h3>
          <video ref={remoteRef} autoPlay playsInline></video>
        </div>
      </div>

      <button onClick={startCamera}>Start Meeting</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
