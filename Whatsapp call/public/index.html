<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Call UI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="call-screen">
    <img src="https://i.imgur.com/4Z7Dz6n.png" class="profile">
    <h2>John Doe</h2>
    <p id="status">Calling...</p>

    <div class="buttons">
        <button class="mute">🎤</button>
        <button class="speaker">🔊</button>
        <button class="end" onclick="endCall()">📞</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
