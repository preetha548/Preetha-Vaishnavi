<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shop Billing System - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h2>Shop Billing System</h2>
        <button onclick="logout()">Logout</button>
    </div>

    <div class="container">
        <h3>Add Product</h3>
        <input type="text" id="productName" placeholder="Product Name">
        <input type="number" id="productPrice" placeholder="Price">
        <button onclick="addProduct()">Add Product</button>

        <h3>Product List</h3>
        <table border="1" id="productTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        // Check login
        if(localStorage.getItem('loggedIn') !== 'true'){
            window.location.href = 'login.html';
        }

        // Get products from localStorage or empty array
        let products = JSON.parse(localStorage.getItem('products') || '[]');

        function displayProducts() {
            const tbody = document.querySelector('#productTable tbody');
            tbody.innerHTML = '';
            products.forEach((p, index) => {
                tbody.innerHTML += `
                    <tr>
                        <td>${p.name}</td>
                        <td>${p.price}</td>
                        <td>
                            <button onclick="editProduct(${index})">Edit</button>
                            <button onclick="deleteProduct(${index})">Delete</button>
                        </td>
                    </tr>
                `;
            });
        }

        function addProduct() {
            const name = document.getElementById('productName').value;
            const price = document.getElementById('productPrice').value;
            if(name && price) {
                products.push({name, price});
                localStorage.setItem('products', JSON.stringify(products));
                displayProducts();
                document.getElementById('productName').value = '';
                document.getElementById('productPrice').value = '';
            } else {
                alert("Enter valid product details!");
            }
        }

        function editProduct(index) {
            const newName = prompt("Edit Product Name:", products[index].name);
            const newPrice = prompt("Edit Product Price:", products[index].price);
            if(newName && newPrice){
                products[index] = {name: newName, price: newPrice};
                localStorage.setItem('products', JSON.stringify(products));
                displayProducts();
            }
        }

        function deleteProduct(index) {
            if(confirm("Are you sure you want to delete this product?")) {
                products.splice(index, 1);
                localStorage.setItem('products', JSON.stringify(products));
                displayProducts();
            }
        }

        function logout() {
            localStorage.removeItem('loggedIn');
            window.location.href = 'login.html';
        }

        displayProducts();
    </script>
</body>
</html>
