<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chocolate Bouquet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🍫 Chocolate Bouquet</h1>

        <div class="bouquet">
            <div class="chocolate">Dairy Milk</div>
            <div class="chocolate">KitKat</div>
            <div class="chocolate">Ferrero</div>
            <div class="chocolate">5 Star</div>
            <div class="chocolate">Snickers</div>
            <div class="chocolate">Milky Bar</div>
        </div>

        <div class="wrapper"></div>

        <button onclick="orderNow()">Order Now</button>
    </div>

    <script>
        function orderNow() {
            alert("Chocolate Bouquet Ordered Successfully!");
        }
    </script>

</body>
</html>
