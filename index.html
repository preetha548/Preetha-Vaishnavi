<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loan Application Form UK</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #1c2240;
        margin: 0;
        padding: 0;
    }

    .container {
        width: 70%;
        margin: 40px auto;
        background-color: #e6e6e6;
        padding: 40px;
        box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    h1 {
        text-align: center;
        font-size: 48px;
        margin-bottom: 40px;
    }

    h3 {
        margin-top: 30px;
    }

    .form-group {
        margin: 15px 0;
    }

    label {
        display: inline-block;
        width: 250px;
        font-weight: bold;
    }

    input, select {
        width: 250px;
        padding: 5px;
        border: none;
        border-bottom: 2px solid black;
        background: transparent;
        outline: none;
    }

    .submit-btn {
        margin-top: 30px;
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        background-color: black;
        color: white;
        border: none;
    }

    .submit-btn:hover {
        background-color: #333;
    }

    .footer {
        text-align: center;
        margin-top: 40px;
        font-size: 20px;
    }

    .error {
        color: red;
        font-size: 12px;
        margin-left: 250px;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Loan Application Form Template UK</h1>

    <form id="loanForm">

        <h3>Personal Information</h3>

        <div class="form-group">
            <label>Full Name:</label>
            <input type="text" id="name">
            <div class="error" id="nameError"></div>
        </div>

        <div class="form-group">
            <label>Date of Birth:</label>
            <input type="date" id="dob">
        </div>

        <div class="form-group">
            <label>National Insurance Number:</label>
            <input type="text" id="ni">
        </div>

        <div class="form-group">
            <label>Address:</label>
            <input type="text" id="address">
        </div>

        <div class="form-group">
            <label>City:</label>
            <input type="text" id="city">
        </div>

        <div class="form-group">
            <label>Postcode:</label>
            <input type="text" id="postcode">
        </div>

        <div class="form-group">
            <label>Phone Number:</label>
            <input type="text" id="phone">
        </div>

        <div class="form-group">
            <label>Email Address:</label>
            <input type="email" id="email">
            <div class="error" id="emailError"></div>
        </div>

        <h3>Employment Information</h3>

        <div class="form-group">
            <label>Current Employer's Name:</label>
            <input type="text" id="employer">
        </div>

        <div class="form-group">
            <label>Job Title:</label>
            <input type="text" id="job">
        </div>

        <div class="form-group">
            <label>Employment Start Date:</label>
            <input type="date" id="startDate">
        </div>

        <div class="form-group">
            <label>Employment Type:</label>
            <select id="type">
                <option value="">Select</option>
                <option>Full-time</option>
                <option>Part-time</option>
            </select>
        </div>

        <div class="form-group">
            <label>Annual Income:</label>
            <input type="number" id="income">
        </div>

        <div class="form-group">
            <label>Other Income (if any):</label>
            <input type="number" id="otherIncome">
        </div>

        <button type="submit" class="submit-btn">Submit</button>
    </form>

    <div class="footer">©</div>
</div>

<script>
document.getElementById("loanForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let isValid = true;

    // Clear errors
    document.getElementById("nameError").textContent = "";
    document.getElementById("emailError").textContent = "";

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();

    // Name validation
    if (name === "") {
        document.getElementById("nameError").textContent = "Name is required";
        isValid = false;
    }

    // Email validation
    let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    if (!email.match(emailPattern)) {
        document.getElementById("emailError").textContent = "Enter a valid email";
        isValid = false;
    }

    if (isValid) {
        alert("Form submitted successfully!");
        document.getElementById("loanForm").reset();
    }
});
</script>

</body>
</html>
