<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Advanced Brand Protection Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:linear-gradient(135deg,#020617,#0f172a); color:white; }
.hero { background:url('https://images.unsplash.com/photo-1605902711622-cfb43c4437d1') center/cover; height:200px; border-radius:15px; display:flex; align-items:center; justify-content:center; }
.hero h1 { background:rgba(0,0,0,0.6); padding:10px 20px; border-radius:10px; }
.card { background:#1e293b; border-radius:12px; text-align:center; padding:15px; margin-bottom:15px; }
.safe { background:#065f46 !important; }
.unsafe { background:#7f1d1d !important; }
.login-bg {
  background:url('https://images.unsplash.com/photo-1510511233900-1982d92bd835') center/cover;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

function App(){
  const [user,setUser]=React.useState(null);
  const [users,setUsers]=React.useState(JSON.parse(localStorage.getItem('users'))||[]);
  const [url,setUrl]=React.useState("");
  const [result,setResult]=React.useState("");
  const [scans,setScans]=React.useState(0);
  const [threats,setThreats]=React.useState(0);
  const [history,setHistory]=React.useState([]);
  const [alert,setAlert]=React.useState(false);
  const chartRef=React.useRef(null);

  // ✅ UPDATED SIGNUP
  const signup=(u,p,name,email,phone)=>{
    const newUsers=[...users,{u,p,name,email,phone}];
    setUsers(newUsers);
    localStorage.setItem('users',JSON.stringify(newUsers));
    alert("Signup successful");
  }

  const login=(u,p)=>{
    const valid=users.find(x=>x.u===u&&x.p===p);
    if(valid) setUser(u);
    else alert("Invalid login");
  }

  const logout=()=> setUser(null);

  const aiDetect=(url)=>{
    let score=0;
    if(!url.includes("https")) score++;
    if(url.includes("login")||url.includes("verify")) score++;
    if(url.includes("free")||url.includes("gift")) score++;
    if(url.length>50) score++;
    return score>=2;
  }

  const scan=()=>{
    const isFake=aiDetect(url);
    setScans(scans+1);

    if(isFake){
      setThreats(threats+1);
      setResult("⚠️ Unsafe Website");
      setAlert(true);
      setTimeout(()=>setAlert(false),2000);
    } else {
      setResult("✅ Safe Website");
    }

    setHistory([...history,{url,status:isFake?"Unsafe":"Safe"}]);
    setTimeout(drawChart,200);
  }

  const drawChart=()=>{
    const ctx=document.getElementById('chart');
    if(chartRef.current) chartRef.current.destroy();

    chartRef.current=new Chart(ctx,{
      type:'pie',
      data:{
        labels:['Safe','Unsafe'],
        datasets:[{data:[scans-threats,threats]}]
      }
    });
  }

  const safeCount=scans-threats;

  if(!user) return <Auth login={login} signup={signup}/>;

  return(
    <div className="container mt-4">

      {alert && <div className="alert alert-danger text-center">🚨 Unsafe Website Detected!</div>}

      <div className="hero"><h1>🛡️ Welcome {user}</h1></div>

      <button className="btn btn-danger mb-3" onClick={logout}>Logout</button>

      <div className="row text-center">
        <div className="col-md-4"><div className="card safe"><h4>Safe</h4><h2>{safeCount}</h2></div></div>
        <div className="col-md-4"><div className="card unsafe"><h4>Unsafe</h4><h2>{threats}</h2></div></div>
        <div className="col-md-4"><div className="card"><h4>Total</h4><h2>{scans}</h2></div></div>
      </div>

      <input className="form-control mt-4" placeholder="Enter URL" onChange={e=>setUrl(e.target.value)}/>
      <button className="btn btn-primary mt-2" onClick={scan}>Scan</button>
      <h4 className="mt-2">{result}</h4>

      <div className="row mt-4">
        <div className="col-md-6"><canvas id="chart"></canvas></div>
        <div className="col-md-6">
          <div className="card">
            <h5>📄 Report Summary</h5>
            <p>Total Scans: {scans}</p>
            <p>Safe Websites: {safeCount}</p>
            <p>Unsafe Websites: {threats}</p>
            <p>Status: {threats>2 ? '⚠️ High Risk' : '✅ Safe'}</p>
          </div>
        </div>
      </div>

      <div className="card mt-4">
        <h5>🌍 Attack Locations</h5>
        <img src="https://images.unsplash.com/photo-1524661135-423995f22d0b" className="img-fluid rounded"/>
      </div>

    </div>
  );
}


// ✅ FULL AUTH MODULE (LOGIN + SIGNUP)
function Auth({login,signup}) {
  const [isSignup,setIsSignup] = React.useState(false);

  const [name,setName] = React.useState("");
  const [email,setEmail] = React.useState("");
  const [phone,setPhone] = React.useState("");
  const [username,setUsername] = React.useState("");
  const [password,setPassword] = React.useState("");
  const [confirm,setConfirm] = React.useState("");

  const handleSignup = () => {
    if(password !== confirm){
      alert("Passwords do not match");
      return;
    }
    signup(username,password,name,email,phone);
  };

  return(
    <div className="login-bg">
      <div className="card p-4" style={{width:"350px"}}>

        <img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b" className="img-fluid mb-3 rounded"/>

        <h3 className="text-center mb-3">
          {isSignup ? "📝 Signup" : "🔐 Login"}
        </h3>

        {isSignup && (
          <>
            <input className="form-control mb-2" placeholder="Full Name" onChange={e=>setName(e.target.value)} />
            <input className="form-control mb-2" placeholder="Email" onChange={e=>setEmail(e.target.value)} />
            <input className="form-control mb-2" placeholder="Phone Number" onChange={e=>setPhone(e.target.value)} />
          </>
        )}

        <input className="form-control mb-2" placeholder="Username" onChange={e=>setUsername(e.target.value)} />
        <input type="password" className="form-control mb-2" placeholder="Password" onChange={e=>setPassword(e.target.value)} />

        {isSignup && (
          <input type="password" className="form-control mb-2" placeholder="Confirm Password" onChange={e=>setConfirm(e.target.value)} />
        )}

        {isSignup ? (
          <button className="btn btn-success w-100 mb-2" onClick={handleSignup}>
            Signup
          </button>
        ) : (
          <button className="btn btn-primary w-100 mb-2" onClick={()=>login(username,password)}>
            Login
          </button>
        )}

        <button className="btn btn-link text-white" onClick={()=>setIsSignup(!isSignup)}>
          {isSignup ? "Already have account? Login" : "Create new account"}
        </button>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
