<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Full Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#f4f6f9; }

.sidebar {
  height:100vh;
  background:#212529;
  color:white;
}

.sidebar a {
  color:white;
  display:block;
  padding:10px;
  text-decoration:none;
}

.sidebar a:hover {
  background:#495057;
}

.card { border-radius:10px; }
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand">School Dashboard</span>
  </div>
</nav>

<div class="container-fluid">
<div class="row">

<!-- Sidebar -->
<div class="col-md-2 sidebar p-3">
  <h4>Menu</h4>
  <a href="#" onclick="showSection('dashboard')">Dashboard</a>
  <a href="#" onclick="showSection('students')">Students</a>
  <a href="#" onclick="showSection('attendance')">Attendance</a>
  <a href="#" onclick="showSection('fees')">Fees</a>
  <a href="#" onclick="showSection('reports')">Reports</a>
  <a href="#" onclick="showSection('settings')">Settings</a>
</div>

<!-- Content -->
<div class="col-md-10 p-4">

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="row">
    <div class="col-md-3">
      <div class="card bg-primary text-white p-3">
        <h5>Total Students</h5>
        <h3 id="totalStudents">3</h3>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card bg-success text-white p-3">
        <h5>Attendance</h5>
        <h3>85%</h3>
      </div>
    </div>
  </div>

  <div class="card mt-4 p-3">
    <h5>Performance Chart</h5>
    <canvas id="chart"></canvas>
  </div>
</div>

<!-- STUDENTS -->
<div id="students" style="display:none;">
  <h4>Add Student</h4>
  <input id="name" placeholder="Name" class="form-control mb-2">
  <input id="marks" placeholder="Marks" class="form-control mb-2">
  <button class="btn btn-primary" onclick="addStudent()">Add</button>

  <h4 class="mt-4">Student List</h4>
  <input id="search" placeholder="Search..." class="form-control mb-2" onkeyup="searchStudent()">

  <table class="table table-striped">
    <thead>
      <tr><th>Name</th><th>Marks</th></tr>
    </thead>
    <tbody id="studentTable"></tbody>
  </table>
</div>

<!-- ATTENDANCE -->
<div id="attendance" style="display:none;">
  <h4>Attendance</h4>
  <button class="btn btn-success" onclick="markAttendance()">Mark Present</button>
  <p id="attendanceStatus"></p>
</div>

<!-- FEES -->
<div id="fees" style="display:none;">
  <h4>Fees Payment</h4>
  <input id="amount" placeholder="Amount" class="form-control mb-2">
  <button class="btn btn-success" onclick="payFees()">Pay</button>
  <p id="paymentStatus"></p>
</div>

<!-- REPORTS -->
<div id="reports" style="display:none;">
  <h4>Reports</h4>
  <p>Total Students: <span id="reportStudents">0</span></p>
</div>

<!-- SETTINGS -->
<div id="settings" style="display:none;">
  <h4>Settings</h4>
  <button class="btn btn-dark" onclick="darkMode()">Toggle Dark Mode</button>
</div>

</div>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
