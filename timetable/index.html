<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>College Schedule</title>

  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="container">

  <h1>COLLEGE SCHEDULE</h1>

  <div class="details">
    <div>Year <span></span></div>
    <div>Semester <span></span></div>
  </div>

  <table>
    <thead>
      <tr>
        <th class="time-head">TIME</th>
        <th class="mon">MON.</th>
        <th class="tue">TUES.</th>
        <th class="wed">WED.</th>
        <th class="thu">THUR.</th>
        <th class="fri">FRI.</th>
      </tr>
    </thead>

    <tbody id="scheduleBody">
    </tbody>
  </table>

  <div class="quote">
    Believe it,<br>
    and you are halfway there.
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
