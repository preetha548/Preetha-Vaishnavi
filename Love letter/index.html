<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>React Love Letter</title>

  <!-- React CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#ffdde1,#ee9ca7);
      font-family:'Courier New', monospace;
      overflow:hidden;
    }

    .paper{
      width:420px;
      background:#fffdf7;
      padding:30px;
      border-radius:15px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
      position:relative;
      overflow:hidden;
    }

    .paper::before{
      content:"";
      position:absolute;
      left:40px;
      top:0;
      width:2px;
      height:100%;
      background:#ff6b6b;
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      color:#d6336c;
      font-size:32px;
    }

    .letter{
      padding-left:20px;
      color:#333;
      line-height:1.8;
      font-size:20px;
    }

    .heart{
      text-align:center;
      font-size:40px;
      margin-top:20px;
      animation:heartbeat 1s infinite;
    }

    @keyframes heartbeat{
      0%{
        transform:scale(1);
      }
      50%{
        transform:scale(1.2);
      }
      100%{
        transform:scale(1);
      }
    }

    .signature{
      margin-top:20px;
      text-align:right;
      font-size:22px;
      color:#444;
    }

    button{
      margin-top:20px;
      padding:10px 20px;
      border:none;
      border-radius:10px;
      background:#ff4d6d;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#d6336c;
    }

    .btn-box{
      text-align:center;
    }

    @media(max-width:500px){
      .paper{
        width:90%;
      }

      .letter{
        font-size:18px;
      }
    }

  </style>
</head>

<body>

  <div id="root"></div>

  <script type="text/babel">

    function LoveLetter(){

      const showMessage = () => {
        alert("You are loved forever ❤️");
      };

      return(
        <div className="paper">

          <h1>Love Letter 💌</h1>

          <div className="letter">
            Sometimes I wonder what I did to deserve you.
            Not a single day goes by without thinking about you.
            You make my world brighter and my heart happier.
            There is no one like you.

            <br/><br/>

            I can’t wait to hug you, make memories with you,
            and tell you how much you truly mean to me.
            You have my heart forever.
          </div>

          <div className="heart">❤️</div>

          <div className="signature">
            Yours Forever
          </div>

          <div className="btn-box">
            <button onClick={showMessage}>
              Click Me
            </button>
          </div>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<LoveLetter />);

  </script>

</body>
</html>
